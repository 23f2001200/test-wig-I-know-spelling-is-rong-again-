name: Cache Workflow

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache dependencies
        id: cache-step
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: cache-3b54b5c

      - name: prime-cache-3b54b5c
        run: |
          if [ "${{ steps.cache-step.outputs.cache-hit }}" == "true" ]; then
            echo "Cache hit for cache-3b54b5c"
          else
            echo "Cache miss for cache-3b54b5c"
            # generate some files to cache
            mkdir -p ~/.npm
            echo "cached data" > ~/.npm/test.txt
          fi
